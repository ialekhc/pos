name: Render Deploy

on:
  workflow_dispatch:
    inputs:
      deploy_api:
        description: "Deploy API service"
        required: false
        default: true
        type: boolean
      deploy_web:
        description: "Deploy web service"
        required: false
        default: true
        type: boolean
  push:
    branches:
      - pos-deploy
    paths:
      - "apps/**"
      - "render.yaml"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/render-deploy.yml"

concurrency:
  group: render-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.1.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @pos/api prisma:generate

      - name: Build API
        run: pnpm --filter @pos/api build

      - name: Build Web
        run: pnpm --filter @pos/web build

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 35

    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_API_SERVICE_ID: ${{ secrets.RENDER_API_SERVICE_ID }}
      RENDER_WEB_SERVICE_ID: ${{ secrets.RENDER_WEB_SERVICE_ID }}
      RENDER_API_HEALTHCHECK_URL: ${{ secrets.RENDER_API_HEALTHCHECK_URL }}
      RENDER_WEB_URL: ${{ secrets.RENDER_WEB_URL }}

    steps:
      - name: Ensure secrets are configured
        shell: bash
        run: |
          set -euo pipefail
          missing=0

          for key in RENDER_API_KEY RENDER_API_SERVICE_ID RENDER_WEB_SERVICE_ID RENDER_API_HEALTHCHECK_URL RENDER_WEB_URL; do
            if [ -z "${!key:-}" ]; then
              echo "::error::Missing required secret: ${key}"
              missing=1
            fi
          done

          if [ "${missing}" -eq 1 ]; then
            exit 1
          fi

      - name: Trigger API deploy
        id: trigger_api
        if: ${{ github.event_name == 'push' || inputs.deploy_api }}
        shell: bash
        run: |
          set -euo pipefail
          payload='{"clearCache":"do_not_clear"}'
          response="$(curl -fsSL \
            -X POST "https://api.render.com/v1/services/${RENDER_API_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "${payload}")"

          deploy_id="$(echo "${response}" | jq -r '.id')"
          if [ -z "${deploy_id}" ] || [ "${deploy_id}" = "null" ]; then
            echo "::error::Unable to parse API deploy id."
            echo "${response}"
            exit 1
          fi

          echo "deploy_id=${deploy_id}" >> "${GITHUB_OUTPUT}"
          echo "API deploy started: ${deploy_id}"

      - name: Wait for API deploy
        if: ${{ steps.trigger_api.outputs.deploy_id != '' }}
        shell: bash
        run: |
          set -euo pipefail
          deploy_id="${{ steps.trigger_api.outputs.deploy_id }}"

          for attempt in $(seq 1 80); do
            response="$(curl -fsSL \
              -H "Authorization: Bearer ${RENDER_API_KEY}" \
              "https://api.render.com/v1/services/${RENDER_API_SERVICE_ID}/deploys/${deploy_id}")"
            status="$(echo "${response}" | jq -r '.status')"

            echo "API deploy status: ${status} (attempt ${attempt}/80)"

            case "${status}" in
              live)
                exit 0
                ;;
              build_failed|update_failed|canceled|cancelled)
                echo "::error::API deploy failed with status ${status}"
                echo "${response}"
                exit 1
                ;;
            esac

            sleep 15
          done

          echo "::error::Timed out waiting for API deploy to finish."
          exit 1

      - name: Trigger web deploy
        id: trigger_web
        if: ${{ github.event_name == 'push' || inputs.deploy_web }}
        shell: bash
        run: |
          set -euo pipefail
          payload='{"clearCache":"do_not_clear"}'
          response="$(curl -fsSL \
            -X POST "https://api.render.com/v1/services/${RENDER_WEB_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "${payload}")"

          deploy_id="$(echo "${response}" | jq -r '.id')"
          if [ -z "${deploy_id}" ] || [ "${deploy_id}" = "null" ]; then
            echo "::error::Unable to parse web deploy id."
            echo "${response}"
            exit 1
          fi

          echo "deploy_id=${deploy_id}" >> "${GITHUB_OUTPUT}"
          echo "Web deploy started: ${deploy_id}"

      - name: Wait for web deploy
        if: ${{ steps.trigger_web.outputs.deploy_id != '' }}
        shell: bash
        run: |
          set -euo pipefail
          deploy_id="${{ steps.trigger_web.outputs.deploy_id }}"

          for attempt in $(seq 1 80); do
            response="$(curl -fsSL \
              -H "Authorization: Bearer ${RENDER_API_KEY}" \
              "https://api.render.com/v1/services/${RENDER_WEB_SERVICE_ID}/deploys/${deploy_id}")"
            status="$(echo "${response}" | jq -r '.status')"

            echo "Web deploy status: ${status} (attempt ${attempt}/80)"

            case "${status}" in
              live)
                exit 0
                ;;
              build_failed|update_failed|canceled|cancelled)
                echo "::error::Web deploy failed with status ${status}"
                echo "${response}"
                exit 1
                ;;
            esac

            sleep 15
          done

          echo "::error::Timed out waiting for web deploy to finish."
          exit 1

      - name: API health check
        if: ${{ github.event_name == 'push' || inputs.deploy_api }}
        shell: bash
        run: |
          set -euo pipefail
          response="$(curl -fsSL "${RENDER_API_HEALTHCHECK_URL}")"
          status="$(echo "${response}" | jq -r '.status // empty')"
          if [ "${status}" != "ok" ]; then
            echo "::error::Unexpected API health payload"
            echo "${response}"
            exit 1
          fi
          echo "API health check passed."

      - name: Web route check
        if: ${{ github.event_name == 'push' || inputs.deploy_web }}
        shell: bash
        run: |
          set -euo pipefail
          code="$(curl -sS -o /dev/null -w '%{http_code}' "${RENDER_WEB_URL}/login")"
          if [ "${code}" != "200" ]; then
            echo "::error::Web login route check failed with HTTP ${code}"
            exit 1
          fi
          echo "Web route check passed."
