services:
  - type: web
    name: pos-api-free
    runtime: node
    plan: free
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @pos/api prisma:generate && pnpm --filter @pos/api build
    startCommand: pnpm --filter @pos/api exec prisma migrate deploy && pnpm --filter @pos/api start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      - key: SUPER_ADMIN_EMAIL
        value: superadmin@platform.local
      - key: SUPER_ADMIN_PASSWORD
        sync: false

  - type: web
    name: pos-web-free
    runtime: node
    plan: free
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @pos/web build
    startCommand: pnpm --filter @pos/web start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_BASE_URL
        sync: false
      - key: NEXT_PUBLIC_SOCKET_URL
        sync: false
